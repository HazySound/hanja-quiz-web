<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- viewport-fit=cover: 아이폰 노치·홈바까지 화면 꽉 차게(안전영역은 CSS가 처리).
         interactive-widget=resizes-content: 키보드가 뜨면 레이아웃 뷰포트(100dvh)를 줄이도록 선언. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#1b1b1f" />
    <!-- iOS에서 홈화면 추가 시 전체화면 앱처럼.
         status-bar-style: black-translucent(콘텐츠가 상태바 밑까지)을 빼서, 콘텐츠가
         다이나믹아일랜드/상태바 밑으로 안 들어가게(스크롤해도 안 가려짐). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="한자퀴즈" />
    <title>한자 퀴즈</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
